version: "3"

vars:
  EXT_NAME: clicksub
  VERSION:
    sh: jq -r .version manifest.json

tasks:
  default:
    deps: [validate, test, build]
  build:
    desc: Build the .zip for Firefox extension submission
    deps: [validate]
    cmds:
      - mkdir -p out
      - rm -f "out/{{.EXT_NAME}}-{{.VERSION}}.zip"
      - zip "out/{{.EXT_NAME}}-{{.VERSION}}.zip"
          manifest.json
          background.js
          content.js
          content.css
          utils.js
          popup.html
          popup.js
          icon.png
          LICENSE
    generates:
      - "out/{{.EXT_NAME}}-{{.VERSION}}.zip"

  validate:
    desc: Check required files and manifest fields
    cmds:
      - |
        ok=true
        for f in manifest.json background.js content.js content.css utils.js popup.html popup.js icon.png LICENSE; do
          if [ ! -f "$f" ]; then
            echo "ERROR: missing $f"
            ok=false
          fi
        done
        if [ "$ok" = false ]; then exit 1; fi
        echo "All checks passed"
    silent: true

  release:
    desc: "Bump version, commit, tag, and push. Usage: task release [-- minor|major]"
    cmds:
      - |
        if [ -n "$(git status --porcelain)" ]; then
          echo "ERROR: working tree is dirty — commit your changes first"
          exit 1
        fi
        part="{{.CLI_ARGS}}"
        if [ -z "$part" ]; then echo "ERROR: provide a part (major, minor, or patch)"; exit 1; fi
        current=$(jq -r .version manifest.json)
        IFS='.' read -r major minor patch <<< "$current"
        patch=${patch:-0}
        case "$part" in
          major) new="$((major + 1)).0.0" ;;
          minor) new="$major.$((minor + 1)).0" ;;
          patch) new="$major.$minor.$((patch + 1))" ;;
          *) echo "Unknown part: $part (use major, minor, or patch)"; exit 1 ;;
        esac
        jq --arg v "$new" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
        npm version "$new" --no-git-tag-version
        tag="v$new"
        git add manifest.json package.json package-lock.json
        git commit -m "$tag"
        git tag "$tag"
        git push origin main "$tag"
        echo "Released $current → $new ($tag)"

  test:
    desc: Run unit tests
    cmds:
      - node --test test/*.test.js

  clean:
    desc: Remove built zip files
    cmds:
      - rm -rf out
