version: "3"

interval: 250ms

vars:
  EXT_NAME: clicksub
  VERSION:
    sh: jq -r .version manifest.firefox.json

tasks:
  default:
    deps: [test, build]

  build:
    desc: Build Firefox and Chrome extension directories and zip archives
    deps: [build-zips]

  build-dirs:
    desc: Copy extension files into out/<browser>-build/ directories
    sources:
      - src/**/*
      - manifest.firefox.json
      - manifest.chrome.json
      - LICENSE
    cmds:
      - for:
          - firefox
          - chrome
        cmd: |
          build_dir="out/{{.ITEM}}-build"
          rm -rf "$build_dir"
          mkdir -p "$build_dir"
          cp "manifest.{{.ITEM}}.json" "$build_dir/manifest.json"
          cp -r src "$build_dir/src"
          cp LICENSE "$build_dir/"

  build-zips:
    desc: Package out/<browser>-build/ into zip archives
    deps: [build-dirs]
    cmds:
      - for:
          - firefox
          - chrome
        cmd: |
          zip_name="{{.EXT_NAME}}-{{.VERSION}}-{{.ITEM}}.zip"
          rm -f "out/$zip_name"
          cd "out/{{.ITEM}}-build" && zip -r "../$zip_name" .

  install:
    desc: Install npm dependencies
    cmds:
      - npm install
    sources:
      - package.json
      - package-lock.json

  test:
    desc: Run unit tests
    sources:
      - test/**/*
      - src/**/*
    cmds:
      - node --test test/*.test.js

  release:
    deps: [test, build]
    desc: "Bump version, commit, tag, and push. Usage: task release -- <major|minor|patch>"
    cmds:
      - |
        if [ -n "$(git status --porcelain)" ]; then
          echo "ERROR: working tree is dirty — commit your changes first"
          exit 1
        fi
        part="{{.CLI_ARGS}}"
        if [ -z "$part" ]; then echo "ERROR: provide a part (major, minor, or patch)"; exit 1; fi
        current=$(jq -r .version manifest.firefox.json)
        IFS='.' read -r major minor patch <<< "$current"
        patch=${patch:-0}
        case "$part" in
          major) new="$((major + 1)).0.0" ;;
          minor) new="$major.$((minor + 1)).0" ;;
          patch) new="$major.$minor.$((patch + 1))" ;;
          *) echo "Unknown part: $part (use major, minor, or patch)"; exit 1 ;;
        esac
        jq --arg v "$new" '.version = $v' manifest.firefox.json > manifest.tmp && mv manifest.tmp manifest.firefox.json
        jq --arg v "$new" '.version = $v' manifest.chrome.json > manifest.tmp && mv manifest.tmp manifest.chrome.json
        npm version "$new" --no-git-tag-version
        tag="v$new"
        git add manifest.firefox.json manifest.chrome.json package.json package-lock.json
        git commit -m "$tag"
        git tag "$tag"
        git push origin main "$tag"
        echo "Released $current → $new ($tag)"

  clean:
    desc: Remove out/ directory (build dirs and zip archives)
    cmds:
      - rm -rf out
