<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 10px;
            width: 220px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        select {
            width: 100%;
            margin-top: 4px;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #ccc;
            margin-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 6px 0;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            cursor: pointer;
            font-size: 13px;
            color: #555;
        }

        .tab-btn.active {
            border-bottom-color: #1a73e8;
            color: #1a73e8;
            font-weight: bold;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        #colorSwatches {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-top: 6px;
        }

        .color-swatch {
            aspect-ratio: 1;
            width: 100%;
            border: 2px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            padding: 0;
            box-sizing: border-box;
        }

        .color-swatch.selected {
            border-color: #1a73e8;
            box-shadow: 0 0 0 1px #1a73e8;
        }

        #customPicker {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #customColorPreview {
            width: 28px;
            height: 80px;
            border-radius: 4px;
            border: 2px solid #ccc;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        #customColorPreview.selected {
            border-color: #1a73e8;
            box-shadow: 0 0 0 1px #1a73e8;
        }

        #slidersColumn {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .slider-label {
            width: 10px;
            font-size: 11px;
            color: #555;
            font-weight: normal;
            margin: 0;
        }

        .slider-row input[type="range"] {
            flex: 1;
            height: 12px;
            -webkit-appearance: none;
            appearance: none;
            border-radius: 6px;
            outline: none;
            padding: 0;
            margin: 0;
        }

        .slider-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #333;
            cursor: pointer;
        }

        .slider-row input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #333;
            cursor: pointer;
        }

        #hueSlider {
            background: linear-gradient(to right,
                hsl(0, 100%, 50%), hsl(60, 100%, 50%), hsl(120, 100%, 50%),
                hsl(180, 100%, 50%), hsl(240, 100%, 50%), hsl(300, 100%, 50%), hsl(360, 100%, 50%));
        }
    </style>
</head>

<body>
    <div class="tabs">
        <button class="tab-btn active" data-tab="general">General</button>
        <button class="tab-btn" data-tab="appearance">Appearance</button>
        <button class="tab-btn" data-tab="advanced">Advanced</button>
    </div>

    <div id="tab-general" class="tab-panel active">
        <label for="sourceLang">Source language:</label>
        <select id="sourceLang">
            <option value="auto">Auto-detect</option>
            <option value="BG">Bulgarian</option>
            <option value="ZH">Chinese (Simplified)</option>
            <option value="CS">Czech</option>
            <option value="DA">Danish</option>
            <option value="NL">Dutch</option>
            <option value="EN">English</option>
            <option value="ET">Estonian</option>
            <option value="FI">Finnish</option>
            <option value="FR">French</option>
            <option value="DE">German</option>
            <option value="EL">Greek</option>
            <option value="HU">Hungarian</option>
            <option value="ID">Indonesian</option>
            <option value="IT">Italian</option>
            <option value="JA">Japanese</option>
            <option value="KO">Korean</option>
            <option value="LV">Latvian</option>
            <option value="LT">Lithuanian</option>
            <option value="NB">Norwegian (Bokmål)</option>
            <option value="PL">Polish</option>
            <option value="PT">Portuguese</option>
            <option value="RO">Romanian</option>
            <option value="RU">Russian</option>
            <option value="SK">Slovak</option>
            <option value="SL">Slovenian</option>
            <option value="ES">Spanish</option>
            <option value="SV">Swedish</option>
            <option value="TR">Turkish</option>
            <option value="UK">Ukrainian</option>
        </select>

        <label for="targetLang">Target language:</label>
        <select id="targetLang">
            <option value="BG">Bulgarian</option>
            <option value="ZH">Chinese (Simplified)</option>
            <option value="CS">Czech</option>
            <option value="DA">Danish</option>
            <option value="NL">Dutch</option>
            <option value="EN" selected>English</option>
            <option value="ET">Estonian</option>
            <option value="FI">Finnish</option>
            <option value="FR">French</option>
            <option value="DE">German</option>
            <option value="EL">Greek</option>
            <option value="HU">Hungarian</option>
            <option value="ID">Indonesian</option>
            <option value="IT">Italian</option>
            <option value="JA">Japanese</option>
            <option value="KO">Korean</option>
            <option value="LV">Latvian</option>
            <option value="LT">Lithuanian</option>
            <option value="NB">Norwegian (Bokmål)</option>
            <option value="PL">Polish</option>
            <option value="PT">Portuguese</option>
            <option value="RO">Romanian</option>
            <option value="RU">Russian</option>
            <option value="SK">Slovak</option>
            <option value="SL">Slovenian</option>
            <option value="ES">Spanish</option>
            <option value="SV">Swedish</option>
            <option value="TR">Turkish</option>
            <option value="UK">Ukrainian</option>
        </select>
        <label for="apiKey">DeepL API key:</label>
        <input type="password" id="apiKey" placeholder="Enter your API key" style="width: 100%;" />
        <small>You can get one from <a href="https://www.deepl.com/en/your-account/keys" target="_blank">DeepL API
                Keys</a></small>
    </div>

    <div id="tab-appearance" class="tab-panel">
        <label for="subtitleFontSize">Subtitle font size: <span id="subtitleFontSizeValue">40</span>px</label>
        <input type="range" id="subtitleFontSize" min="8" max="72" value="40" style="width: 100%; margin-top: 4px;" />

        <label>Highlight color:</label>
        <div id="colorSwatches">
            <button type="button" class="color-swatch" data-color="#ffff00" style="background: #ffff00;" title="Yellow"></button>
            <button type="button" class="color-swatch" data-color="#ffa94d" style="background: #ffa94d;" title="Orange"></button>
            <button type="button" class="color-swatch" data-color="#ff8787" style="background: #ff8787;" title="Red"></button>
            <button type="button" class="color-swatch" data-color="#ff8cc6" style="background: #ff8cc6;" title="Pink"></button>
            <button type="button" class="color-swatch" data-color="#b197fc" style="background: #b197fc;" title="Purple"></button>
            <button type="button" class="color-swatch" data-color="#74c0fc" style="background: #74c0fc;" title="Blue"></button>
            <button type="button" class="color-swatch" data-color="#8ce99a" style="background: #8ce99a;" title="Green"></button>
        </div>

        <div id="customPicker">
            <div id="customColorPreview"></div>
            <div id="slidersColumn">
                <div class="slider-row">
                    <span class="slider-label">H</span>
                    <input type="range" id="hueSlider" min="0" max="360" value="60">
                </div>
                <div class="slider-row">
                    <span class="slider-label">S</span>
                    <input type="range" id="satSlider" min="0" max="100" value="100">
                </div>
                <div class="slider-row">
                    <span class="slider-label">L</span>
                    <input type="range" id="lightSlider" min="0" max="100" value="50">
                </div>
            </div>
        </div>
    </div>

    <div id="tab-advanced" class="tab-panel">
        <label for="contextHistorySize">Context history size:</label>
        <input type="number" id="contextHistorySize" min="0" max="10" value="5" style="width: 100%;" />
        <small>Previous subtitle lines sent to DeepL as context for better translations. Set to 0 to disable.</small>

        <label for="deeplModelType">Translation model:</label>
        <select id="deeplModelType">
            <option value="prefer_quality_optimized">High quality</option>
            <option value="latency_optimized">Fast</option>
        </select>
        <small>High quality uses DeepL's next-gen model where available; falls back to fast otherwise.</small>

        <label style="margin-top: 10px; font-weight: normal;">
            <input type="checkbox" id="pauseOnTranslate" /> Pause video on translate
        </label>

        <button type="button" id="resetAdvanced" style="margin-top: 14px; width: 100%; padding: 6px;">Reset to defaults</button>
    </div>

    <p id="statusMsg" style="font-size: 12px; color: green; margin-top: 6px;"></p>

    <div id="usageFooter" style="margin-top: 12px; padding-top: 8px; border-top: 1px solid #ddd; font-size: 11px; color: #888; text-align: center; display: none;">
        <div id="usageBar" style="height: 6px; border-radius: 3px; background: #eee; margin-bottom: 4px; overflow: hidden;">
            <div id="usageBarFill" style="height: 100%; border-radius: 3px; background: #1a73e8; width: 0%; transition: width 0.3s;"></div>
        </div>
        <span id="usageText"></span>
    </div>

    <script src="constants.js"></script>
    <script src="popup.js"></script>
</body>

</html>
